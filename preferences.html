<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preferințe - Laborator 3</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="light">
    <div class="container">
        <nav>
            <a href="index.html">🏠 Acasă</a>
            <a href="preferences.html">⚙️ Preferințe</a>
            <a href="cookies-info.html">🍪 Cookies Info</a>
            <a href="login.html">🔐 Login</a>
        </nav>

        <h1>⚙️ Setări Preferințe</h1>
        
        <form id="prefsForm">
            <label for="username">Nume Utilizator:</label>
            <input type="text" id="username" name="username" required minlength="3">

            <label for="theme">Tema:</label>
            <select id="theme" name="theme">
                <option value="light">☀️ Luminos</option>
                <option value="dark">🌙 Întunecat</option>
            </select>

            <label for="language">Limba:</label>
            <select id="language" name="language">
                <option value="ro">🇷🇴 Română</option>
                <option value="en">🇬🇧 English</option>
                <option value="fr">🇫🇷 Français</option>
            </select>

            <label for="fontSize">Dimensiune Font:</label>
            <select id="fontSize" name="fontSize">
                <option value="14">14px</option>
                <option value="16">16px</option>
                <option value="18">18px</option>
                <option value="20">20px</option>
            </select>

            <button type="submit" class="btn btn-success">💾 Salvează Preferințele</button>
        </form>

        <div id="message"></div>
    </div>

    <script src="js/cookies.js"></script>
    <script src="js/storage.js"></script>
    <script>
        // Aplică tema curentă
        const currentTheme = CookieManager.get('theme') || 'light';
        document.body.className = currentTheme;
        document.getElementById('theme').value = currentTheme;

        // Pre-populare formular cu valori salvate
        document.addEventListener('DOMContentLoaded', () => {
            if (CookieManager.get('username')) {
                document.getElementById('username').value = CookieManager.get('username');
            }
            if (StorageManager.getLocal('language')) {
                document.getElementById('language').value = StorageManager.getLocal('language');
            }
            if (StorageManager.getLocal('fontSize')) {
                document.getElementById('fontSize').value = StorageManager.getLocal('fontSize');
                document.body.style.fontSize = StorageManager.getLocal('fontSize') + 'px';
            }
        });

        // Handle submit
        document.getElementById('prefsForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const theme = document.getElementById('theme').value;
            const language = document.getElementById('language').value;
            const fontSize = document.getElementById('fontSize').value;

            // Salvează în cookies
            CookieManager.set('username', username, 365);
            CookieManager.set('theme', theme, 365);
            
            // Salvează în localStorage
            StorageManager.setLocal('language', language);
            StorageManager.setLocal('fontSize', fontSize);

            // Aplică modificările imediat
            document.body.className = theme;
            document.body.style.fontSize = fontSize + 'px';

            // Mesaj succes
            const msg = document.getElementById('message');
            msg.innerHTML = '<div class="alert alert-success">✅ Preferințele au fost salvate!</div>';
            
            // Redirecționare după 1.5 secunde
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1500);
        });
    </script>
</body>
</html>
