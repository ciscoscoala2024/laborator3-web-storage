<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coș - Laborator 3</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="light">
    <div class="container">
        <nav>
            <a href="index.html">🏠 Acasă</a>
            <a href="dashboard.html">📊 Dashboard</a>
            <button onclick="logout()" class="btn btn-danger" style="float:right;padding:5px 15px;">🚪 Deconectare</button>
        </nav>

        <h1>🛒 Coșul Tău de Cumpărături</h1>

        <!-- Adaugă produs -->
        <div class="section">
            <h3>➕ Adaugă Produs</h3>
            <form id="addToCartForm" class="flex-row" style="align-items:flex-end;">
                <div>
                    <label for="product">Produs:</label>
                    <select id="product" required>
                        <option value="">-- Selectează --</option>
                        <option value="laptop">💻 Laptop - 2500 RON</option>
                        <option value="telefon">📱 Telefon - 1200 RON</option>
                        <option value="tableta">📟 Tabletă - 800 RON</option>
                        <option value="casti">🎧 Căști - 150 RON</option>
                    </select>
                </div>
                <div>
                    <label for="quantity">Cantitate:</label>
                    <input type="number" id="quantity" min="1" max="10" value="1" style="width:70px;">
                </div>
                <button type="submit" class="btn btn-success">Adaugă</button>
            </form>
        </div>

        <!-- Listează coș -->
        <div class="section">
            <h3>📦 Produse în Coș</h3>
            <table id="cartTable">
                <thead>
                    <tr>
                        <th>Produs</th>
                        <th>Cantitate</th>
                        <th>Preț unitar</th>
                        <th>Total</th>
                        <th>Acțiune</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
            
            <h3 style="text-align:right;margin-top:15px;">
                TOTAL: <span id="cartTotal" style="color:var(--success-color);font-size:1.2em;">0 RON</span>
            </h3>
            
            <div class="text-center mt-2">
                <button onclick="clearCart()" class="btn btn-danger">🗑️ Golește Coșul</button>
            </div>
        </div>
    </div>

    <script src="js/cookies.js"></script>
    <script src="js/storage.js"></script>
    <script>
        document.body.className = CookieManager.get('theme') || 'light';

        // === Verificare autentificare ===
        if (!StorageManager.getSession('session')) {
            window.location.href = 'login.html';
        }

        // === Produse disponibile ===
        const products = {
            laptop: { name: '💻 Laptop', price: 2500 },
            telefon: { name: '📱 Telefon', price: 1200 },
            tableta: { name: '📟 Tabletă', price: 800 },
            casti: { name: '🎧 Căști', price: 150 }
        };

        // === Încarcă coșul ===
        function loadCart() {
            const cart = StorageManager.getSession('cart') || {};
            const tbody = document.querySelector('#cartTable tbody');
            tbody.innerHTML = '';
            let total = 0;

            Object.entries(cart).forEach(([key, qty]) => {
                const product = products[key];
                if (!product) return;
                
                const row = tbody.insertRow();
                row.insertCell(0).textContent = product.name;
                row.insertCell(1).textContent = qty;
                row.insertCell(2).textContent = product.price + ' RON';
                row.insertCell(3).textContent = (product.price * qty) + ' RON';
                
                const actionCell = row.insertCell(4);
                const btn = document.createElement('button');
                btn.textContent = '🗑️';
                btn.className = 'btn-danger';
                btn.style.padding = '5px 10px';
                btn.onclick = () => {
                    delete cart[key];
                    StorageManager.setSession('cart', cart);
                    loadCart();
                };
                actionCell.appendChild(btn);
                
                total += product.price * qty;
            });

            if (Object.keys(cart).length === 0) {
                const row = tbody.insertRow();
                row.insertCell(0).colSpan = 5;
                row.cells[0].textContent = 'Coșul este gol 🛒';
                row.cells[0].style.textAlign = 'center';
            }

            document.getElementById('cartTotal').textContent = total + ' RON';
        }

        // === Adaugă în coș ===
        document.getElementById('addToCartForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const product = document.getElementById('product').value;
            const quantity = parseInt(document.getElementById('quantity').value);
            
            const cart = StorageManager.getSession('cart') || {};
            cart[product] = (cart[product] || 0) + quantity;
            StorageManager.setSession('cart', cart);
            
            loadCart();
            e.target.reset();
        });

        // === Golește coș ===
        function clearCart() {
            if (confirm('Golești coșul?')) {
                StorageManager.removeSession('cart');
                loadCart();
            }
        }

        // === Logout ===
        function logout() {
            StorageManager.removeSession('session');
            StorageManager.removeSession('cart');
            window.location.href = 'index.html';
        }

        // Inițializare
        loadCart();
    </script>
</body>
</html>
