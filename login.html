<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Laborator 3</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="light">
    <div class="container" style="max-width:400px;">
        <nav>
            <a href="index.html">🏠 Acasă</a>
            <a href="register.html">📝 Înregistrare</a>
        </nav>

        <h1 class="text-center">🔐 Autentificare</h1>
        
        <form id="loginForm">
            <label for="username">Username:</label>
            <input type="text" id="username" required>

            <label for="password">Parolă:</label>
            <input type="password" id="password" required>

            <label>
                <input type="checkbox" id="remember"> Ține-mă minte
            </label>

            <button type="submit" class="btn btn-success">🚀 Login</button>
        </form>

        <p class="text-center mt-2">
            Nu ai cont? <a href="register.html">Înregistrează-te</a>
        </p>

        <div id="message"></div>
    </div>

    <script src="js/cookies.js"></script>
    <script src="js/storage.js"></script>
    <script>
        document.body.className = CookieManager.get('theme') || 'light';

        // === Inițializare utilizatori de test ===
        function initDefaultUsers() {
            if (!StorageManager.getLocal('users')) {
                const defaultUsers = [
                    { id: 1, username: 'admin', password: 'password', email: 'admin@example.com' },
                    { id: 2, username: 'student', password: 'student123', email: 'student@example.com' }
                ];
                StorageManager.setLocal('users', defaultUsers);
                console.log('✅ Utilizatori de test creați');
            }
        }
        initDefaultUsers();

        // === Handle login ===
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            const message = document.getElementById('message');

            const users = StorageManager.getLocal('users') || [];
            const user = users.find(u => u.username === username && u.password === password);

            if (user) {
                // ✅ Login reușit
                if (remember) {
                    CookieManager.set('username', user.username, 30);
                }

                // Creează sesiune
                const session = {
                    userId: user.id,
                    username: user.username,
                    email: user.email,
                    loginTime: new Date().toISOString(),
                    sessionId: 'sess_' + Math.random().toString(36).substr(2, 9)
                };
                StorageManager.setSession('session', session);

                message.innerHTML = '<div class="alert alert-success">✅ Autentificat cu succes!</div>';
                
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);
            } else {
                // ❌ Login eșuat
                message.innerHTML = '<div class="alert alert-error">❌ Username sau parolă incorectă!</div>';
            }
        });
    </script>
</body>
</html>
